<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>처리 결과</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page page-mini">
        <div class="topbar">
            <div class="brand">
                <img class="brand-logo" src="/static/images/tossbank-logo.png" alt="tossbank">
                <div class="brand-text">
                    <div class="brand-title">자재관리</div>
                    <div class="brand-subtitle">Material Management</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="message-wrap">
                <h1 class="message-title">{{title}}</h1>
                <p class="message-text">{{message}}</p>
                <a class="btn" href="/material/list">목록으로 이동</a>
            </div>
        </div>
    </div>
</body>
</html>
