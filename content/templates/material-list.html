<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자재 목록</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <img class="brand-logo" src="/static/images/tossbank-logo.png" alt="tossbank">
                <div class="brand-text">
                    <div class="brand-title">자재관리</div>
                    <div class="brand-subtitle">Material Management</div>
                </div>
            </div>
            <div class="topbar-right">
                <span class="top-chip">SCM Admin</span>
            </div>
        </div>

        <div class="hero">
            <h1 class="hero-title">자재 목록</h1>
            <p class="hero-text">자재 정보를 조회하고 관리합니다.</p>
        </div>

        <div class="panel">
            <div class="panel-head">
                <div>
                    <h2 class="panel-title">전체 자재</h2>
                    <p class="panel-text">등록된 자재 데이터를 확인할 수 있습니다.</p>
                </div>
                <a class="btn" href="/material/write">자재 등록</a>
            </div>

            <div class="panel-body">
                {{table_section}}
            </div>
        </div>
    </div>
</body>
</html>
